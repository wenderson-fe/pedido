spring.application.name=pedidos-api
spring.datasource.url=jdbc:mysql://localhost:3306/food_pedidos?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=47557609
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# URL do Eureka Server.
# O cliente utiliza esse endereço para localizar o Service Registry
eureka.client.serviceUrl.defaultZone=http://localhost:8081/eureka

# Define um identificador único para cada instância do serviço no Eureka,
# combinando o nome da aplicaçăo com um valor aleatório.
eureka.instance.instance-id=${spring.application.name}:${random.int}

# Porta em que a aplicaçăo será executada.
# Ao usar "0", o Spring Boot atribui automaticamente uma porta aleatória disponível no sistema.
//server.port=0
server.port=8080